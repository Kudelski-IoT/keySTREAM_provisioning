# Sign & Flash configuration — read by standalone_sign_and_flash.py
# Run:  python standalone_sign_and_flash.py run
#       (signs, then asks whether to flash the image)
# ---------------------------------------------------------------------------

[keystream]
Fleet_uid            = XYZ
keySTREAM_API_Token  = ABC
keySTREAM_Signingkey = XYZ

# ---------------------------------------------------------------------------
# WiFi credentials — hardcoded here, written into fota_app_config.h
# ---------------------------------------------------------------------------
[wifi]
ssid     = WiFi-SSID
password = WiFi-PSWD

# ---------------------------------------------------------------------------
# Component images
#   comp_X_file : filename only — resolved from the .trustplatform\keystream_fota
#                 directory (same folder as this .ini file).
#   comp_X_info : info-struct address in the hex (hardcoded per firmware build).
# ---------------------------------------------------------------------------
[components]
comp_1_file = keystream_boot.X.production.hex
comp_1_info = 0xFC00

comp_2_file = keystream_Fota.X.production.hex
comp_2_info = 0x6FC00

# ---------------------------------------------------------------------------
# Output
#   output_dir is resolved relative to the .trustplatform\keystream_fota folder.
# ---------------------------------------------------------------------------
[output]
output_dir = signed_out
