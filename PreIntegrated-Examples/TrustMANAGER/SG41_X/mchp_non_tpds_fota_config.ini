# Sign & Flash configuration — read by standalone_sign_and_flash.py
# Run:  python standalone_sign_and_flash.py run
#       (signs, then asks whether to flash the image)
# ---------------------------------------------------------------------------

[keystream]
Fleet_uid            = XYZ
keySTREAM_API_Token  = ABC
keySTREAM_Signingkey = XYZ

# ---------------------------------------------------------------------------
# WiFi credentials — hardcoded here, written into fota_app_config.h
# ---------------------------------------------------------------------------
[wifi]
ssid     = WiFi-SSID
password = WiFi-PSWD

# ---------------------------------------------------------------------------
# Component images
#   comp_X_file : filename only — resolved from the .trustplatform\keystream_fota
#                 directory (same folder as this .ini file).
#   comp_X_info : info-struct address in the hex (hardcoded per firmware build).
# ---------------------------------------------------------------------------
[components]
comp_1_file = keystream_boot.X.production.hex
comp_1_info = 0xFC00

comp_2_file = keystream_Fota.X.production.hex
comp_2_info = 0x6FC00

# ---------------------------------------------------------------------------
# Output
#   output_dir is resolved relative to the .trustplatform\keystream_fota folder.
# ---------------------------------------------------------------------------
[output]
output_dir = signed_out

# ---------------------------------------------------------------------------
# ATECC608 provisioning (mirrors the TPDS FoTA proto-provision step)
#   enable      : true  -> write the keySTREAM signer public key into the slot
#                 false -> skip device provisioning (signing/flashing only)
#
#   NOTE: This step requires a CryptoAuth Trust Platform Kit (EV10E69A or
#   similar) with a direct USB-HID bridge to the ATECC608.  The EV89U05A
#   (SG41 + PKoB4) does NOT expose the ATECC608 over USB HID — set
#   enable = false and use the generated signed_out/signer_pubkey.h instead
#   (write SIGNER_PUBLIC_KEY to slot 14 from your bootloader firmware).
#
#   slot        : ATECC608 slot for the signer public key. TPDS uses 15;
#                 this application uses 14.
#   i2c_address : ATECC608 I2C address (kit HID interface). Default 0x70.
# ---------------------------------------------------------------------------
[provision]
enable      = false
slot        = 14
i2c_address = 0x70
